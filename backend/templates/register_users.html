<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>
    <link rel="stylesheet" href="/static/register_users.css">
</head>
<body>

<div class="form-container">
    <h1>Create User</h1>

    <form method="post" action="/admin/register">
        <input type="text" name="nombre" placeholder="Name" required>
        <input type="text" name="apellidos" placeholder="Surname" required>

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="">Select role</option>
            <option value="estudiante">Student</option>
            <option value="profesor">Professor</option>
        </select>

        <button type="submit" class="btn-primary">Create</button>
    </form>

    <a href="/dashboard-admin" class="back-link">← Back</a>
</div>

</body>
</html>
