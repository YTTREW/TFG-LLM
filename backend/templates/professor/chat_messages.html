<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Review Chat - {{ chat.title }}</title>
        <link rel="stylesheet" href="/static/css/professor/chat_messages.css">
        <link rel="icon" type="image/png" href="/static/images/logoWeb.jpg">
    </head>
    <body>
        <div class="chat-container">
            <h1>Session Review</h1>
            <p class="subtitle">{{ chat.title }}</p>

            <div class="chat-header">
                <form action="/professor/chat/{{ chat.id }}/grade" method="post" class="grade-form">
                    <div class="grade-top-row">
                        <label for="grade">Final Grade (0 - 10)</label>
                        <input type="number" id="grade" name="grade" min="0" max="10" step="0.1" value="{{ chat.grade if chat.grade is not none else '' }}" required>
                    </div>

                    <label for="feedback" class="feedback-label">Professor's Feedback</label>
                    <textarea id="feedback" name="feedback" placeholder="Write areas for improvement or positive notes...">{{ chat.feedback if chat.feedback else '' }}</textarea>

                    <button type="submit" class="btn-save">Save Evaluation</button>
                </form>
            </div>

            <div class="messages-box">
                {% for msg in messages %}
                <div class="message {{ msg.role }}">
                    <div class="message-role">
                        {% if msg.role == 'assistant' %} 🤖 Virtual Patient {% else %} 🎓 Student {% endif %}
                    </div>
                    <div class="message-content">{{ msg.content }}</div>
                </div>
                {% endfor %}
            </div>

            <a href="/professor/student/{{ chat.student_id }}/chats" class="back-link">
                ← Back to conversations
            </a>
        </div>
    </body>
</html>
