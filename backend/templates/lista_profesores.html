<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professors List</title>
    <link rel="stylesheet" href="/static/css/lista_profesores.css">
    <link rel="icon" type="image/png" href="/static/images/logoWeb.jpg">
</head>
<body>

<div class="page-container">
    <h1>Professors</h1>

    <div class="professors-card">
        <table class="professors-table">
            <thead>
                <tr>
                    <th>Professor</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for professor in professors %}
                <tr>
                    <td class="professor-name">
                        {{ professor.nombre }} {{ professor.apellidos }}
                    </td>
                    <td>
                        <form action="/admin/delete-professor/{{ professor.id }}" method="post">
                            <button class="btn-delete" type="submit">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <a href="/dashboard-admin" class="back-link">← Back</a>
</div>

</body>
</html>
